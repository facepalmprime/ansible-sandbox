---
clone:
  git:
    image: woodpeckerci/plugin-git
    volumes:
      - /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem:/etc/ssl/certs/ca-certificates.crt

when:
  branch: main
  event: push

steps:
  - name: lint
    image: node1:3000/mrplatinum/ansible-lint:6.22.2
    pull: true
    environment:
      ANSIBLE_CONFIG: /woodpecker/src/node1/mrplatinum/ansible-sandbox/ansible.cfg
      VAULT_PASSWORD:
        from_secret: vault_password
    commands:
      - echo "$VAULT_PASSWORD" > secret.txt
      - ansible-lint
      - rm -f secret.txt
