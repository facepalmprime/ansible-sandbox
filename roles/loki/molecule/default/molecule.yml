---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: rocky9-loki-test
    image: geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    privileged: false
    capabilities:
      - SYS_ADMIN
    cgroupns_mode: host
    command: /usr/sbin/init

  - name: ubuntu22-loki-test
    image: docker.io/geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: false
    capabilities:
      - SYS_ADMIN
    cgroupns_mode: host
    command: /usr/sbin/init
provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3
        env_name: molecule
verifier:
  name: ansible
