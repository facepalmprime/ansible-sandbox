---
- name: Create loki group
  ansible.builtin.group:
    name: "{{ loki_group }}"
    system: true
    state: present

- name: Create loki user
  ansible.builtin.user:
    name: "{{ loki_user }}"
    group: "{{ loki_group }}"
    shell: /sbin/nologin
    system: true
    create_home: false
    comment: Grafana Loki

- name: Create loki directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0750"
  loop:
    - "{{ loki_config_dir }}"
    - "{{ loki_tls_dir }}"
    - "{{ loki_data_dir }}"
    - "{{ loki_data_dir }}/chunks"
    - "{{ loki_data_dir }}/rules"
    - "{{ loki_data_dir }}/compactor"

- name: Deploy Loki CA cert
  ansible.builtin.copy:
    src: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca/ca.crt"
    dest: "{{ loki_tls_ca_cert }}"
    owner: root
    group: "{{ loki_group }}"
    mode: "0640"
  notify: Restart loki

- name: Deploy TLS certificate
  ansible.builtin.copy:
    src: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca/{{ inventory_hostname }}.crt"
    dest: "{{ loki_tls_cert }}"
    owner: root
    group: "{{ loki_group }}"
    mode: "0640"
  notify: Restart loki

- name: Deploy TLS private key
  ansible.builtin.copy:
    src: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca/{{ inventory_hostname }}.key"
    dest: "{{ loki_tls_key }}"
    owner: root
    group: "{{ loki_group }}"
    mode: "0640"
  notify: Restart loki

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Install unzip
  ansible.builtin.package:
    name: unzip
    state: present

- name: Download loki binary
  ansible.builtin.get_url:
    url: "{{ loki_download_url }}"
    dest: "/tmp/loki-linux-{{ loki_arch }}.zip"
    checksum: "{{ loki_checksum }}"
    mode: "0644"

- name: Extract loki binary
  ansible.builtin.unarchive:
    src: "/tmp/loki-linux-{{ loki_arch }}.zip"
    dest: /tmp/
    remote_src: true

- name: Install loki binary
  ansible.builtin.copy:
    src: "/tmp/loki-linux-{{ loki_arch }}"
    dest: "{{ loki_binary }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart loki

- name: Deploy loki config
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ loki_config_dir }}/loki-config.yml"
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0640"
  notify: Restart loki

- name: Deploy loki systemd unit
  ansible.builtin.template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart loki

- name: Install firewalld on Rocky
  ansible.builtin.package:
    name:
      - firewalld
      - python3-firewall
    state: present
  when: ansible_os_family == 'RedHat'

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
  when:
    - ansible_os_family == 'RedHat'
    - env_name != 'molecule'

- name: Configure firewall - Rocky
  ansible.posix.firewalld:
    rich_rule: "rule family='ipv4' source address='{{ tailscale_cgnat_range }}' port port='{{ loki_http_port }}' protocol='tcp' accept"
    state: enabled
    permanent: true
    immediate: true
  when:
    - ansible_os_family == 'RedHat'
    - env_name != 'molecule'

- name: Configure firewall - Ubuntu
  community.general.ufw:
    rule: allow
    port: "{{ loki_http_port }}"
    proto: tcp
    src: "{{ tailscale_cgnat_range }}"
  when:
    - ansible_os_family == 'Debian'
    - env_name != 'molecule'

- name: Set SELinux port context for loki
  community.general.seport:
    ports: "{{ loki_http_port }}"
    proto: tcp
    setype: http_port_t
    state: present
  when:
    - ansible_os_family == 'RedHat'
    - ansible_selinux.status == 'enabled'
    - env_name != 'molecule'

- name: Enable and start loki
  ansible.builtin.systemd:
    name: loki
    state: started
    enabled: true
    daemon_reload: true
