---
- name: Verify node_exporter
  hosts: all
  gather_facts: true
  vars_files:
    - "{{ lookup('env', 'HOME') }}/projects/ansible-sandbox/environments/prod/group_vars/prod/vault.yml"
    - "../../defaults/main.yml"
  tasks:
    - name: Check node_exporter binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/node_exporter
      register: node_exporter_bin

    - name: Assert binary present
      ansible.builtin.assert:
        that: node_exporter_bin.stat.exists and node_exporter_bin.stat.executable
        fail_msg: "node_exporter binary missing or not executable"

    - name: Check node_exporter user and shell
      ansible.builtin.command:
        cmd: getent passwd node_exporter
      changed_when: false
      failed_when: false
      register: node_exporter_user

    - name: Assert user exists with nologin shell
      ansible.builtin.assert:
        that:
          - node_exporter_user.rc == 0
          - "'/nologin' in node_exporter_user.stdout"
        fail_msg: "node_exporter user missing or does not use nologin shell"

    - name: Check node_exporter systemd unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/node_exporter.service
      register: node_exporter_unit

    - name: Assert unit file present
      ansible.builtin.assert:
        that: node_exporter_unit.stat.exists
        fail_msg: "node_exporter.service unit file missing"

    - name: Check web.config.yml exists and is restricted
      ansible.builtin.stat:
        path: /etc/node_exporter/web.config.yml
      register: node_exporter_webcfg

    - name: Assert web config present and not world readable
      ansible.builtin.assert:
        that:
          - node_exporter_webcfg.stat.exists
          - node_exporter_webcfg.stat.mode in ["0640", "0600"]
        fail_msg: "web.config.yml missing or world readable"

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert service is active and enabled
      ansible.builtin.assert:
        that:
          - ansible_facts.services['node_exporter.service'].state == 'running'
          - ansible_facts.services['node_exporter.service'].status == 'enabled'
        fail_msg: "node_exporter service not active or not enabled"

    - name: Check metrics endpoint responds over HTTPS with basic auth
      ansible.builtin.uri:
        url: "https://localhost:{{ node_exporter_port }}/metrics"
        return_content: false
        status_code: 200
        validate_certs: false
        url_username: prometheus
        url_password: "{{ vault_node_exporter_auth_password }}"
        force_basic_auth: true
