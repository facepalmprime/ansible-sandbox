---
- name: Prepare - generate self-signed TLS certificates for molecule hosts
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure CA directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca"
        state: directory
        mode: "0700"

    - name: Generate private key for each molecule host
      community.crypto.openssl_privatekey:
        path: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca/{{ item }}.key"
        type: RSA
        size: 2048
        mode: "0600"
      loop: "{{ groups['all'] }}"

    - name: Generate CSR for each molecule host
      community.crypto.openssl_csr_pipe:
        privatekey_path: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca/{{ item }}.key"
        common_name: "{{ item }}"
        subject_alt_name:
          - "DNS:{{ item }}"
          - "DNS:localhost"
          - "IP:127.0.0.1"
      loop: "{{ groups['all'] }}"
      register: node_exporter_csr_results

    - name: Generate self-signed certificate for each molecule host
      community.crypto.x509_certificate:
        path: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca/{{ item.item }}.crt"
        csr_content: "{{ item.csr }}"
        privatekey_path: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca/{{ item.item }}.key"
        provider: selfsigned
        selfsigned_not_after: "+30d"
        mode: "0644"
      loop: "{{ node_exporter_csr_results.results }}"
