---
- name: Create ansible group
  ansible.builtin.group:
    name: ansible
    state: present

- name: Create ansible service account
  ansible.builtin.user:
    name: ansible
    group: ansible
    shell: /bin/bash
    create_home: true
    password_lock: true
    comment: Ansible automation service account

- name: Create .ssh directory for ansible user
  ansible.builtin.file:
    path: /home/ansible/.ssh
    state: directory
    owner: ansible
    group: ansible
    mode: '0700'

- name: Deploy SSH authorized key for ansible user
  ansible.posix.authorized_key:
    user: ansible
    key: "{{ bootstrap_ansible_svc_pubkey }}"
    state: present
    exclusive: true

- name: Configure scoped passwordless sudo for ansible user
  ansible.builtin.template:
    src: ansible-sudoers.j2
    dest: /etc/sudoers.d/ansible
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s

- name: Create adm group on RedHat (log reader group - matches Debian convention)
  ansible.builtin.group:
    name: adm
    system: true
    state: present
  when: ansible_os_family == 'RedHat'

- name: Deploy logrotate config for ansible sudo audit log
  ansible.builtin.template:
    src: ansible-sudo-logrotate.j2
    dest: /etc/logrotate.d/ansible-sudo
    owner: root
    group: root
    mode: "0644"

- name: Check if ansible sudo audit log exists
  ansible.builtin.stat:
    path: /var/log/ansible-sudo.log
  register: bootstrap_sudo_log

- name: Ensure ansible sudo audit log is adm-readable
  ansible.builtin.file:
    path: /var/log/ansible-sudo.log
    owner: root
    group: adm
    mode: "0640"
  when: bootstrap_sudo_log.stat.exists
