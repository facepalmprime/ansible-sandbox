---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: rocky8-test
    image: docker.io/geerlingguy/docker-rockylinux8-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
  - name: ubuntu22-test
    image: docker.io/geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
provisioner:
  name: ansible
  env:
    ANSIBLE_CONFIG: "../../ansible.cfg"
  config_options:
    defaults:
      remote_user: root
verifier:
  name: ansible
