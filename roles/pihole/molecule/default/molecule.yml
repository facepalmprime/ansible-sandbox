---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: rocky9-pihole-test
    image: docker.io/geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
provisioner:
  name: ansible
  env:
    ANSIBLE_VAULT_PASSWORD_FILE: "~/projects/ansible-sandbox/secret.txt"
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3
        env_name: molecule
verifier:
  name: ansible
