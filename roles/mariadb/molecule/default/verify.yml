---
- name: Verify mariadb role
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert mariadb-server is installed
      ansible.builtin.assert:
        that: "'mariadb-server' in ansible_facts.packages"
        fail_msg: "mariadb-server is not installed"

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert mariadb service is active
      ansible.builtin.assert:
        that: "ansible_facts.services['mariadb.service'].state == 'running'"
        fail_msg: "mariadb service is not running"

    - name: Assert mariadb service is enabled
      ansible.builtin.assert:
        that: "ansible_facts.services['mariadb.service'].status == 'enabled'"
        fail_msg: "mariadb service is not enabled"

    - name: Check gitea database exists
      ansible.builtin.command:
        cmd: mysql -u root -e "SHOW DATABASES LIKE 'gitea';"
      register: db_check
      changed_when: false

    - name: Assert gitea database exists
      ansible.builtin.assert:
        that: "'gitea' in db_check.stdout"
        fail_msg: "gitea database not found in MariaDB"

    - name: Check gitea database user exists
      ansible.builtin.command:
        cmd: mysql -u root -e "SELECT User FROM mysql.user WHERE User='gitea';"
      register: user_check
      changed_when: false

    - name: Assert gitea user exists
      ansible.builtin.assert:
        that: "'gitea' in user_check.stdout"
        fail_msg: "gitea MariaDB user not found"

    - name: Check anonymous users are absent
      ansible.builtin.command:
        cmd: mysql -u root -e "SELECT COUNT(*) FROM mysql.user WHERE User='';"
      register: anon_users
      changed_when: false

    - name: Assert no anonymous users
      ansible.builtin.assert:
        that: "'0' in anon_users.stdout"
        fail_msg: "Anonymous MySQL users still exist"

    - name: Check test database is absent
      ansible.builtin.command:
        cmd: mysql -u root -e "SHOW DATABASES LIKE 'test';"
      register: test_db
      changed_when: false

    - name: Assert test database is gone
      ansible.builtin.assert:
        that: "test_db.stdout_lines | length <= 1"
        fail_msg: "test database still exists"
