---
- name: Install MariaDB server and Python connector
  ansible.builtin.dnf:
    name:
      - mariadb-server
      - python3-PyMySQL
    state: present

- name: Restrict MariaDB to loopback only
  ansible.builtin.lineinfile:
    path: /etc/my.cnf.d/mariadb-server.cnf
    insertafter: '^\[mariadb\]'
    regexp: '^bind-address'
    line: 'bind-address = 127.0.0.1'
  notify: Restart mariadb

- name: Start and enable MariaDB
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true

- name: Create Gitea database
  ansible.mysql.mysql_db:
    name: "{{ mariadb_gitea_db }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Create Gitea database user
  ansible.mysql.mysql_user:
    name: "{{ mariadb_gitea_user }}"
    password: "{{ mariadb_gitea_password }}"
    priv: "{{ mariadb_gitea_db }}.*:ALL"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Remove anonymous MariaDB users
  ansible.mysql.mysql_user:
    name: ''
    host_all: true
    state: absent
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Remove test database
  ansible.mysql.mysql_db:
    name: test
    state: absent
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Remove remote root access
  ansible.mysql.mysql_user:
    name: root
    host: '%'
    state: absent
    login_unix_socket: /var/lib/mysql/mysql.sock
