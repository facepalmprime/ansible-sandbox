---
- name: Restart immich
  ansible.builtin.command:
    cmd: podman-compose -f {{ immich_config_dir }}/docker-compose.yml up -d --remove-orphans
  when: env_name != 'molecule'
  changed_when: true

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  when: env_name != 'molecule'
