---
- name: Verify immich role (container-safe checks)
  hosts: all
  gather_facts: false
  tasks:
    - name: Check /etc/immich directory exists
      ansible.builtin.stat:
        path: /etc/immich
      register: immich_etc_dir

    - name: Assert /etc/immich directory present
      ansible.builtin.assert:
        that:
          - immich_etc_dir.stat.isdir
        fail_msg: "/etc/immich was not created by the role"

    - name: Check immich user and shell
      ansible.builtin.command:
        cmd: getent passwd immich
      register: immich_user
      changed_when: false
      failed_when: false

    - name: Assert immich user exists with nologin shell
      ansible.builtin.assert:
        that:
          - immich_user.rc == 0
          - "'/nologin' in immich_user.stdout"
        fail_msg: "immich user missing or does not use nologin shell"

    - name: Check /srv/immich directory exists
      ansible.builtin.stat:
        path: /srv/immich
      register: immich_srv_dir

    - name: Assert /srv/immich present
      ansible.builtin.assert:
        that:
          - immich_srv_dir.stat.exists
          - immich_srv_dir.stat.isdir
        fail_msg: "/srv/immich was not created by the role"

    - name: Check /srv/immich/model-cache directory exists
      ansible.builtin.stat:
        path: /srv/immich/model-cache
      register: immich_ml_cache_dir

    - name: Assert /srv/immich/model-cache present with correct owner
      ansible.builtin.assert:
        that:
          - immich_ml_cache_dir.stat.exists
          - immich_ml_cache_dir.stat.isdir
          - immich_ml_cache_dir.stat.pw_name == "immich"
          - immich_ml_cache_dir.stat.gr_name == "immich"
        fail_msg: "/srv/immich/model-cache missing or wrong owner - expected immich:immich"
