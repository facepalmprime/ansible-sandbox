---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: rocky8-immich-test
    image: docker.io/geerlingguy/docker-rockylinux8-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
provisioner:
  name: ansible
  env:
    ANSIBLE_CONFIG: "../../ansible.cfg"
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /usr/bin/python3
        env_name: molecule
verifier:
  name: ansible
