---
- name: Verify nextcloud role (container-safe checks only)
  hosts: all
  gather_facts: true
  tasks:
    - name: Check nextcloud group exists
      ansible.builtin.command:
        cmd: getent group nextcloud
      register: nextcloud_group
      changed_when: false
      failed_when: nextcloud_group.rc != 0

    - name: Check nextcloud user exists
      ansible.builtin.command:
        cmd: getent passwd nextcloud
      register: nextcloud_user
      changed_when: false
      failed_when: nextcloud_user.rc != 0

    - name: Assert nextcloud user has nologin shell
      ansible.builtin.assert:
        that: "'/sbin/nologin' in nextcloud_user.stdout"
        fail_msg: "nextcloud user must have /sbin/nologin - got: {{ nextcloud_user.stdout }}"

    - name: Check /var/www/nextcloud directory exists
      ansible.builtin.stat:
        path: /var/www/nextcloud
      register: nextcloud_nc_webroot

    - name: Assert web root present
      ansible.builtin.assert:
        that:
          - nextcloud_nc_webroot.stat.exists
          - nextcloud_nc_webroot.stat.isdir
        fail_msg: "/var/www/nextcloud not created - check ansible.builtin.file task"

    - name: Check /srv/nextcloud data directory exists
      ansible.builtin.stat:
        path: /srv/nextcloud
      register: nextcloud_nc_datadir

    - name: Assert data directory present
      ansible.builtin.assert:
        that:
          - nextcloud_nc_datadir.stat.exists
          - nextcloud_nc_datadir.stat.isdir
        fail_msg: "/srv/nextcloud not created - check ansible.builtin.file task"

    - name: Check PHP-FPM pool config deployed (RedHat)
      ansible.builtin.stat:
        path: /etc/php-fpm.d/nextcloud.conf
      register: nextcloud_nc_fpm_rh
      when: ansible_os_family == 'RedHat'

    - name: Check PHP-FPM pool config deployed (Debian)
      ansible.builtin.stat:
        path: /etc/php/8.1/fpm/pool.d/nextcloud.conf
      register: nextcloud_nc_fpm_deb
      when: ansible_os_family == 'Debian'

    - name: Assert PHP-FPM pool config present (RedHat)
      ansible.builtin.assert:
        that: nextcloud_nc_fpm_rh.stat.exists
        fail_msg: "/etc/php-fpm.d/nextcloud.conf not deployed"
      when: ansible_os_family == 'RedHat'

    - name: Assert PHP-FPM pool config present (Debian)
      ansible.builtin.assert:
        that: nextcloud_nc_fpm_deb.stat.exists
        fail_msg: "/etc/php/8.1/fpm/pool.d/nextcloud.conf not deployed"
      when: ansible_os_family == 'Debian'

    - name: Check nginx vhost config deployed
      ansible.builtin.stat:
        path: /etc/nginx/conf.d/nextcloud.conf
      register: nextcloud_nc_nginx
      when: ansible_os_family == 'RedHat'

    - name: Assert nginx vhost present
      ansible.builtin.assert:
        that: nextcloud_nc_nginx.stat.exists
        fail_msg: "/etc/nginx/conf.d/nextcloud.conf not deployed"
      when: ansible_os_family == 'RedHat'

    - name: Confirm no unrendered Jinja2 vars in nginx config
      ansible.builtin.command:
        cmd: grep -c "vault_" /etc/nginx/conf.d/nextcloud.conf
      register: nextcloud_secret_leak
      changed_when: false
      failed_when: nextcloud_secret_leak.rc == 0
      when:
        - ansible_os_family == 'RedHat'
        - nextcloud_nc_nginx.stat.exists
