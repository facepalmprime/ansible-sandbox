---
- name: Verify nginx role
  hosts: all
  tasks:
    - name: Check nginx is installed
      ansible.builtin.package_facts:
        manager: rpm

    - name: Assert nginx installed
      ansible.builtin.assert:
        that: "'nginx' in ansible_facts.packages"
        fail_msg: "nginx is not installed"

    - name: Check SSL directory exists
      ansible.builtin.stat:
        path: /etc/nginx/ssl
      register: ssl_dir

    - name: Assert SSL directory exists
      ansible.builtin.assert:
        that: ssl_dir.stat.exists
        fail_msg: "nginx SSL directory not found"

    - name: Check proxy config exists
      ansible.builtin.stat:
        path: /etc/nginx/conf.d/woodpecker-proxy.conf
      register: proxy_conf

    - name: Assert proxy config exists
      ansible.builtin.assert:
        that: proxy_conf.stat.exists
        fail_msg: "Woodpecker proxy config not found"
