---
woodpecker_version: "3.16.0"
# Checksums - fetch with:
#   curl -sL https://github.com/woodpecker-ci/woodpecker/releases/download/v<version>/checksums.txt \
#      | grep -E "woodpecker-(server|agent)_linux_amd64.tar.gz"
# Update both hashes whenever woodpecker_version changes.
woodpecker_server_checksum: "sha256:c8e46545a6b68959d5196b8f998403528efb93f12411093967efd914116f2104"
woodpecker_agent_checksum: "sha256:063f865bb63e694090663cd73159c8c3a463641640d93f01977e2e6c12320e59"
woodpecker_user: woodpecker
woodpecker_group: woodpecker
woodpecker_podman_group: podman
woodpecker_home: /var/lib/woodpecker
woodpecker_config_dir: /etc/woodpecker
woodpecker_cert_dir: "{{ woodpecker_config_dir }}/certs"
woodpecker_ca_dir: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca"
woodpecker_server_binary: /usr/local/bin/woodpecker-server
woodpecker_agent_binary: /usr/local/bin/woodpecker-agent
woodpecker_server_port: 8000
woodpecker_bind_addr: "127.0.0.1"
woodpecker_grpc_port: 9000
woodpecker_host: "https://{{ ansible_hostname }}:8443"
woodpecker_gitea_url: "https://node1:3000"
woodpecker_admin_user: mrplatinum
woodpecker_podman_socket: /run/podman/podman.sock
# ansible-lint version used in the pipeline container image (ci/Containerfile.ansible-lint)
woodpecker_ansible_lint_version: "6.22.2"
