# Update both hashes whenever woodpecker_version changes.
woodpecker_server_checksum: "sha256:9c1be66e21930c4453cf5ee13d971555937ca9ef6597329e776dc16ee47f6168"
woodpecker_agent_checksum: "sha256:bfe5359d3d5f06ac09169c2756c289743b2cd8cadde1085daedc55a2a74ac6cf"
woodpecker_user: woodpecker
