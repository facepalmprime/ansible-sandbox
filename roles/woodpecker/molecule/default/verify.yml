---
- name: Verify woodpecker role
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Check woodpecker user exists
      ansible.builtin.command:
        cmd: id woodpecker
      register: woodpecker_user_check
      changed_when: false
      failed_when: woodpecker_user_check.rc != 0

    - name: Check woodpecker user has no login shell
      ansible.builtin.command:
        cmd: getent passwd woodpecker
      register: woodpecker_passwd_entry
      changed_when: false

    - name: Assert woodpecker user shell is nologin
      ansible.builtin.assert:
        that: "'/nologin' in woodpecker_passwd_entry.stdout or '/false' in woodpecker_passwd_entry.stdout"
        fail_msg: "woodpecker user has a login shell - expected /sbin/nologin"

    - name: Check woodpecker-server binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/woodpecker-server
      register: woodpecker_server_binary

    - name: Assert woodpecker-server binary is executable
      ansible.builtin.assert:
        that:
          - woodpecker_server_binary.stat.exists
          - woodpecker_server_binary.stat.executable
        fail_msg: "/usr/local/bin/woodpecker-server missing or not executable"

    - name: Check woodpecker-agent binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/woodpecker-agent
      register: woodpecker_agent_binary

    - name: Assert woodpecker-agent binary is executable
      ansible.builtin.assert:
        that:
          - woodpecker_agent_binary.stat.exists
          - woodpecker_agent_binary.stat.executable
        fail_msg: "/usr/local/bin/woodpecker-agent missing or not executable"

    - name: Check woodpecker data directory exists
      ansible.builtin.stat:
        path: /var/lib/woodpecker
      register: woodpecker_data_dir

    - name: Assert data directory owned by woodpecker
      ansible.builtin.assert:
        that:
          - woodpecker_data_dir.stat.exists
          - woodpecker_data_dir.stat.pw_name == 'woodpecker'
        fail_msg: "/var/lib/woodpecker missing or not owned by woodpecker"

    - name: Check server environment file exists
      ansible.builtin.stat:
        path: /etc/woodpecker/server.env
      register: woodpecker_server_env

    - name: Assert server environment file exists and is mode 0600
      ansible.builtin.assert:
        that:
          - woodpecker_server_env.stat.exists
          - woodpecker_server_env.stat.mode == '0600'
        fail_msg: "/etc/woodpecker/server.env missing or not mode 0600 - secrets exposed"

    - name: Check WOODPECKER_PLUGINS_PRIVILEGED is explicitly denied
      ansible.builtin.command:
        cmd: grep -c '^WOODPECKER_PLUGINS_PRIVILEGED=$' /etc/woodpecker/server.env
      register: woodpecker_privileged_check
      changed_when: false
      failed_when: woodpecker_privileged_check.stdout != "1"

    - name: Check gRPC Unix socket path is set in server config
      ansible.builtin.command:
        cmd: grep -c '^WOODPECKER_GRPC_ADDR=unix:///run/woodpecker/grpc.sock$' /etc/woodpecker/server.env
      register: woodpecker_grpc_server_check
      changed_when: false
      failed_when: woodpecker_grpc_server_check.stdout != "1"

    - name: Check gRPC Unix socket path is set in agent config
      ansible.builtin.command:
        cmd: grep -c '^WOODPECKER_SERVER=unix:///run/woodpecker/grpc.sock$' /etc/woodpecker/agent.env
      register: woodpecker_grpc_agent_check
      changed_when: false
      failed_when: woodpecker_grpc_agent_check.stdout != "1"

    - name: Check gRPC Unix socket exists and is owned by woodpecker
      ansible.builtin.stat:
        path: /run/woodpecker/grpc.sock
      register: woodpecker_grpc_socket
      when: env_name != 'molecule'

    - name: Assert gRPC Unix socket exists and is owned by woodpecker
      ansible.builtin.assert:
        that:
          - woodpecker_grpc_socket.stat.exists
          - woodpecker_grpc_socket.stat.pw_name == 'woodpecker'
        fail_msg: "/run/woodpecker/grpc.sock missing or wrong owner - gRPC socket not created"
      when: env_name != 'molecule'

    - name: Check agent environment file exists
      ansible.builtin.stat:
        path: /etc/woodpecker/agent.env
      register: woodpecker_agent_env

    - name: Assert agent environment file exists ans is mode 0600
      ansible.builtin.assert:
        that:
          - woodpecker_agent_env.stat.exists
          - woodpecker_agent_env.stat.mode == '0600'
        fail_msg: "/etc/woodpecker/agent.env missing or not mode 0600 - secrets exposed"

    - name: Check woodpecker-server systemd unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/woodpecker-server.service
      register: woodpecker_server_unit

    - name: Assert woodpecker-server unit exists
      ansible.builtin.assert:
        that: woodpecker_server_unit.stat.exists
        fail_msg: "/etc/systemd/system/woodpecker-server.service missing"

    - name: Check woodpecker-agent systemd unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/woodpecker-agent.service
      register: woodpecker_agent_unit

    - name: Assert woodpecker-agent unit exists
      ansible.builtin.assert:
        that: woodpecker_agent_unit.stat.exists
        fail_msg: "/etc/systemd/system/woodpecker-agent.service missing"

    - name: Check podman socket systemd drop-in directory exists
      ansible.builtin.stat:
        path: /etc/systemd/system/podman.socket.d
      register: woodpecker_socket_dropin_dir
      when: env_name != 'molecule'

    - name: Assert podman socket drop-in directory exists
      ansible.builtin.assert:
        that: woodpecker_socket_dropin_dir.stat.exists
        fail_msg: "/etc/systemd/system/podman.socket.d missing - socket group override not deployed"
      when: env_name != 'molecule'
