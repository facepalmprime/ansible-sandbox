---
ca_dir: "{{ lookup('env', 'HOME') }}/.ansible-sandbox-ca"

ca_common_name: "Ansible Sandbox Local CA"
ca_org: "Home Lab"
ca_country: "US"

ca_key_size: 4096
ca_validity_days: 3650
ca_node_cert_validity_days: 825

ca_node_cert_dir: /etc/pki/tls/certs
ca_node_key_dir: /etc/pki/tls/private
ca_trust_anchor_dir: /etc/pki/ca-trust/source/anchors

ca_node_cert_cn: "{{ inventory_hostname }}"
