---
- name: Verify CA role
  hosts: all
  tasks:
    - name: Load platform variables
      ansible.builtin.include_vars:
        file: "../../vars/{{ ansible_os_family }}.yml"

    - name: Check CA cert exists in trust anchors
      ansible.builtin.stat:
        path: "{{ ca_trust_anchor_dir }}/ansible-sandbox-ca.crt"
      register: ca_anchor

    - name: Assert CA anchor exists
      ansible.builtin.assert:
        that: ca_anchor.stat.exists
        fail_msg: "CA cert not found in trust anchors"

    - name: Check node certificate exists
      ansible.builtin.stat:
        path: "{{ ca_node_cert_dir }}/{{ inventory_hostname }}.crt"
      register: ca_node_cert

    - name: Assert node cert exists
      ansible.builtin.assert:
        that: ca_node_cert.stat.exists
        fail_msg: "Node cert not found"

    - name: Check node private key exists
      ansible.builtin.stat:
        path: "{{ ca_node_key_dir }}/{{ inventory_hostname }}.key"
      register: ca_node_key

    - name: Assert node key exists and has mode 0640
      ansible.builtin.assert:
        that:
          - ca_node_key.stat.exists
          - ca_node_key.stat.mode == "0640"
        fail_msg: "Node key missing or wrong permissions"
