---
- name: Install policycoreutils-python-utils for SELinux management
  ansible.builtin.dnf:
    name: policycoreutils-python-utils
    state: present
  when: ansible_os_family == 'RedHat'

- name: Install git (required by Gitea)
  ansible.builtin.dnf:
    name: git
    state: present

- name: Create gitea group
  ansible.builtin.group:
    name: "{{ gitea_group }}"
    system: true
    state: present

- name: Create gitea system user
  ansible.builtin.user:
    name: "{{ gitea_user }}"
    group: "{{ gitea_group }}"
    home: "{{ gitea_home }}"
    shell: /sbin/nologin
    system: true
    comment: Gitea git service
    state: present

- name: Create Gitea directory structure
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ gitea_user }}"
    group: "{{ gitea_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ gitea_home }}", mode: "0750" }
    - { path: "{{ gitea_home }}/data", mode: "0750" }
    - { path: "{{ gitea_home }}/log", mode: "0750" }
    - { path: "{{ gitea_home }}/repos", mode: "0750" }
    - { path: "{{ gitea_config_dir }}", mode: "0750" }
    - { path: "{{ gitea_home }}/certs", mode: "0750" }

- name: Download Gitea binary
  ansible.builtin.get_url:
    url: "https://dl.gitea.com/gitea/{{ gitea_version }}/gitea-{{ gitea_version }}-linux-amd64"
    dest: "{{ gitea_binary }}"
    checksum: "{{ gitea_checksum }}"
    mode: "0755"
    owner: root
    group: root
  notify: Restart gitea

- name: Set SELinux file context on Gitea binary
  ansible.builtin.command:
    cmd: semanage fcontext -a -t bin_t "{{ gitea_binary }}"
  when: ansible_selinux.status == 'enabled'
  register: semanage_result
  changed_when: "'already defined' not in semanage_result.stdout and 'already defined' not in semanage_result.stderr"
  failed_when: semanage_result.rc != 0 and 'already defined' not in semanage_result.stderr
  notify: Restore SELinux contexts

- name: Allow Gitea port in SELinux
  ansible.builtin.command:
    cmd: semanage port -a -t http_port_t -p tcp {{ gitea_port }}
  when: ansible_selinux.status == 'enabled'
  register: seport_result
  changed_when: "'already defined' not in seport_result.stdout and 'already defined' not in seport_result.stderr"
  failed_when: seport_result.rc != 0 and 'already defined' not in seport_result.stderr

- name: Open Gitea port in firewalld
  ansible.posix.firewalld:
    port: "{{ gitea_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when: ansible_os_family == 'RedHat' and env_name != 'molecule'

- name: Deploy Gitea app.ini config
  ansible.builtin.template:
    src: app.ini.j2
    dest: "{{ gitea_config_dir }}/app.ini"
    owner: "{{ gitea_user }}"
    group: "{{ gitea_group }}"
    mode: "0600"
  notify: Restart gitea

- name: Deploy Gitea systemd unit file
  ansible.builtin.template:
    src: gitea.service.j2
    dest: /etc/systemd/system/gitea.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart gitea

- name: Start and enable Gitea service
  ansible.builtin.service:
    name: gitea
    state: started
    enabled: true

- name: Copy node certificate for Gitea
  ansible.builtin.copy:
    src: "{{ gitea_ca_dir }}/{{ inventory_hostname }}.crt"
    dest: "{{ gitea_cert_dir }}/{{ inventory_hostname }}.crt"
    owner: "{{ gitea_user }}"
    group: "{{ gitea_group }}"
    mode: "0644"
  notify: Restart gitea

- name: Copy node private key for Gitea
  ansible.builtin.copy:
    src: "{{ gitea_ca_dir }}/{{ inventory_hostname }}.key"
    dest: "{{ gitea_cert_dir }}/{{ inventory_hostname }}.key"
    owner: "{{ gitea_user }}"
    group: "{{ gitea_group }}"
    mode: "0640"
  notify: Restart gitea
