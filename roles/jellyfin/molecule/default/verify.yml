---
- name: Verify jellyfin role (container-safe checks)
  hosts: all
  gather_facts: false
  tasks:
    - name: Check jellyfin group exists
      ansible.builtin.command:
        cmd: getent group jellyfin
      register: jellyfin_group_check
      changed_when: false
      failed_when: jellyfin_group_check.rc != 0

    - name: Check jellyfin user exists with correct shell
      ansible.builtin.command:
        cmd: getent passwd jellyfin
      register: jellyfin_user_check
      changed_when: false
      failed_when: >
        jellyfin_user_check.rc != 0 or '/sbin/nologin' not in jellyfin_user_check.stdout

    - name: Check /srv/media directory
      ansible.builtin.stat:
        path: /srv/media
      register: jellyfin_media_dir

    - name: Assert /srv/media ownership and permissions
      ansible.builtin.assert:
        that:
          - jellyfin_media_dir.stat.exists
          - jellyfin_media_dir.stat.isdir
          - jellyfin_media_dir.stat.pw_name == 'jellyfin'
          - jellyfin_media_dir.stat.gr_name == 'jellyfin'
          - jellyfin_media_dir.stat.mode == "0755"
        fail_msg: "/srv/media missing, wrong owner, or wrong permissions"

    - name: Check Jellyfin systemd service file exists
      ansible.builtin.stat:
        path: /etc/systemd/system/jellyfin.service
      register: jellyfin_service_file

    - name: Assert jellyfin.service is present
      ansible.builtin.assert:
        that: jellyfin_service_file.stat.exists
        fail_msg: "jellyfin.service was not deployed - container will not start"
